baseURL: https://planejun.github.io/ # 绑定的域名
title: PlaneJun's Blog
theme: PaperMod  # 主题名字，和themes文件夹下的一致
paginate: 10

enableRobotsTXT: true
buildDrafts: true
buildFuture: false
buildExpired: false

permalinks: # 访问博客时网址的显示形式
  post: "/:title/"

minify:
  disableXML: true
  
menu:
    main:
        - name: Posts
          url: posts
          weight: 5
        - name: Categories
          url: tags
          weight: 10
        - name: Links
          url: https://github.com/PlaneJun
          weight: 10
        - name: About
          url: https://github.com/adityatelange/hugo-PaperMod/wiki/
params:
    
    env: production # to enable google analytics, opengraph, twitter-cards and schema.
    title: PlaneJun's Blog
    description: "PlaneJun's Blog"
    keywords: [Blog, Portfolio, PaperMod]
    author: PlaneJun
    disableThemeToggle: false
    ShowReadingTime: false
    ShowShareButtons: false
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowWordCount: true
    ShowRssButtonInSectionTermList: false
    UseHugoToc: false
    disableSpecial1stPost: false
    disableScrollToTop: false
    comments: false
    hidemeta: false
    hideSummary: false
    showtoc: true
    tocopen: true

    homeInfoParams:
        Title: "努力成为一个很哇塞的人!!!!!"
        Content: "嘤嘤嘤~~~"
            

    socialIcons:
        - name: github
          url: "https://github.com/PlaneJun"
        - name: qq
          url: "http://wpa.qq.com/msgrd?v=3&uin=543322463&site=qq&menu=yes"
        - name: Email
          url: "mailto:543322463@qq.com"
    
    analytics:
        google:
            SiteVerificationTag: "XYZabc"
        bing:
            SiteVerificationTag: "XYZabc"
        yandex:
            SiteVerificationTag: "XYZabc"

    cover:
        hidden: true # hide everywhere but not in structured data
        hiddenInList: true # hide on list pages and home
        hiddenInSingle: true # hide on single page

    fuseOpts:
        isCaseSensitive: false
        shouldSort: true
        location: 0
        distance: 1000
        threshold: 0.4
        minMatchCharLength: 0
        keys: ["title", "permalink", "summary", "content"]
        
    label: # 左上角图标
        text: "PlaneJun's Blog"
        icon: "icon.jpg"
        iconHeight: 45
        
    assets:
        favicon: "icon.jpg"
        favicon16x16: "icon.jpg"
        favicon32x32: "icon.jpg"
        apple_touch_icon: "icon.jpg"
        safari_pinned_tab: "icon.jpg"

outputs:
  home:
    - HTML
    - RSS
    - JSON
    
taxonomies:
  category: categories
  tag: tags
 
markup:
  goldmark:
    renderer:
      unsafe: true # HUGO 默认转义 Markdown 文件中的 HTML 代码，如需开启的话
  highlight:
    # anchorLineNos: true
    codeFences: true
    guessSyntax: true
    # lineNos: true
    noClasses: true
    tabWidth: 4
    style: monokai
    # codeFences：代码围栏功能，这个功能一般都要设为 true 的，不然很难看，就是干巴巴的-代码文字，没有颜色。
    # guessSyntax：猜测语法，这个功能建议设置为 true, 如果你没有设置要显示的语言则会自动匹配。
    # hl_Lines：高亮的行号，一般这个不设置，因为每个代码块我们可能希望让高亮的地方不一样。
    # lineNoStart：行号从编号几开始，一般从 1 开始。
    # lineNos：是否显示行号，我比较喜欢显示，所以我设置的为 true.
    # lineNumbersInTable：使用表来格式化行号和代码,而不是 标签。这个属性一般设置为 true.
    # noClasses：使用 class 标签，而不是内嵌的内联样式

pygmentsUseClasses: true